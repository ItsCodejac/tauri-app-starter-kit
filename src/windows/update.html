<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Check for Updates</title>
  <link rel="stylesheet" href="../styles/shared.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 32px;
      text-align: center;
    }
    .icon {
      font-size: 36px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 8px;
    }
    .message {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      max-width: 320px;
      line-height: 1.5;
    }
    .release-notes {
      font-size: 11px;
      color: var(--text-tertiary);
      max-width: 320px;
      max-height: 120px;
      overflow-y: auto;
      text-align: left;
      padding: 8px 12px;
      background: var(--surface-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      margin-bottom: 20px;
      line-height: 1.5;
      user-select: text;
      -webkit-user-select: text;
    }
    .actions { display: flex; gap: 8px; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border-standard);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Checking state -->
  <div id="checking">
    <div class="spinner"></div>
    <div class="title">Checking for updates...</div>
  </div>

  <!-- Up to date state -->
  <div id="up-to-date" class="hidden">
    <div class="icon">&#10003;</div>
    <div class="title">You're up to date!</div>
    <div class="message" id="current-version"></div>
  </div>

  <!-- Update available state -->
  <div id="update-available" class="hidden">
    <div class="icon">&#8593;</div>
    <div class="title" id="update-title">Update Available</div>
    <div class="message" id="update-message"></div>
    <div class="release-notes hidden" id="release-notes"></div>
    <div class="actions">
      <button id="skip-btn">Skip</button>
      <button class="primary" id="install-btn">Download & Install</button>
    </div>
  </div>

  <!-- Error state -->
  <div id="error-state" class="hidden">
    <div class="icon">!</div>
    <div class="title">Update check failed</div>
    <div class="message" id="error-message"></div>
    <div class="actions">
      <button id="retry-btn">Retry</button>
    </div>
  </div>

  <script type="module" src="update.js"></script>
</body>
</html>
