<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Preferences</title>
  <link rel="stylesheet" href="../styles/shared.css" />
  <style>
    body {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Main layout: sidebar + content */
    .settings-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left sidebar ── */
    .sidebar {
      width: 200px;
      min-width: 200px;
      background: var(--surface-secondary);
      border-right: 1px solid var(--border-standard);
      overflow-y: auto;
      padding: 8px 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-search {
      margin: 4px 10px 8px 10px;
    }
    .sidebar-search input {
      width: 100%;
      height: 26px;
      font-size: 12px;
      padding: 4px 8px;
      background: var(--surface-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 3px;
      color: var(--text-primary);
      outline: none;
    }
    .sidebar-search input:focus {
      border-color: var(--accent-blue);
    }
    .sidebar-search input::placeholder {
      color: var(--text-tertiary);
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      width: 100%;
      height: 36px;
      padding: 0 14px;
      font-size: 13px;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-radius: 0;
      text-align: left;
      cursor: pointer;
      outline: none;
      font-family: var(--font-ui);
      line-height: 36px;
      transition: background 0.1s, color 0.1s;
    }
    .sidebar-item:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
      border-color: transparent;
    }
    .sidebar-item.active {
      background: rgba(74, 158, 255, 0.15);
      color: var(--text-bright);
      border-color: transparent;
    }

    /* ── Right content area ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    /* Settings pane (hidden unless active) */
    .pane { display: none; }
    .pane.active { display: block; }

    /* Form rows inside group boxes */
    .form-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      min-height: 36px;
    }
    .form-row + .form-row {
      border-top: 1px solid var(--border-subtle);
    }
    .form-label {
      width: 200px;
      min-width: 200px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .form-control {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .form-hint {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* Checkbox rows inside group boxes */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .checkbox-row + .checkbox-row {
      border-top: 1px solid var(--border-subtle);
    }
    .checkbox-row label {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      line-height: 1.4;
    }

    /* Override shared select/input inside settings for comfort */
    select {
      min-width: 180px;
    }
    input[type="number"] {
      min-width: 70px;
    }

    /* Group box spacing */
    .group-box + .group-box {
      margin-top: 20px;
    }
    .group-box:first-child {
      margin-top: 0;
    }

    /* Inline button inside group box */
    .group-box .action-row {
      padding-top: 12px;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 0 20px;
      border-top: 1px solid var(--border-standard);
      background: var(--surface-secondary);
      flex-shrink: 0;
    }
    .footer .left {
      margin-right: auto;
      display: flex;
      gap: 10px;
    }
    .footer button {
      min-width: 80px;
    }
  </style>
</head>
<body>
  <div class="settings-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-search">
        <input type="text" placeholder="Search settings..." />
      </div>
      <div class="sidebar-nav" id="sidebar">
        <button class="sidebar-item active" data-pane="general">General</button>
        <button class="sidebar-item" data-pane="appearance">Appearance</button>
        <button class="sidebar-item" data-pane="autosave">Auto Save</button>
        <button class="sidebar-item" data-pane="performance">Performance</button>
        <button class="sidebar-item" data-pane="cache">Media Cache</button>
        <button class="sidebar-item" data-pane="tray">System Tray</button>
      </div>
    </nav>

    <!-- Content -->
    <div class="content">

      <!-- ── General ── -->
      <div class="pane active" id="pane-general">
        <div class="group-box">
          <div class="group-box-title">Startup</div>
          <div class="form-row">
            <span class="form-label">At Startup</span>
            <div class="form-control">
              <select id="startup-behavior">
                <option value="empty">Show Empty Workspace</option>
                <option value="last">Restore Last Project</option>
                <option value="welcome">Show Welcome Screen</option>
              </select>
            </div>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="check-updates" checked />
            <label for="check-updates">Check for updates on startup</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="autostart" />
            <label for="autostart">Launch at login</label>
          </div>
        </div>

        <div class="group-box">
          <div class="group-box-title">Language</div>
          <div class="form-row">
            <span class="form-label">Display Language</span>
            <div class="form-control">
              <select id="locale">
                <option value="en">English</option>
                <option value="es">Espa&#241;ol</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Appearance ── -->
      <div class="pane" id="pane-appearance">
        <div class="group-box">
          <div class="group-box-title">Theme</div>
          <div class="form-row">
            <span class="form-label">Application Theme</span>
            <div class="form-control">
              <select id="theme">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
                <option value="system">System</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <span class="form-label">UI Zoom</span>
            <div class="form-control">
              <select id="zoom">
                <option value="80">80%</option>
                <option value="90">90%</option>
                <option value="100" selected>100%</option>
                <option value="110">110%</option>
                <option value="120">120%</option>
                <option value="150">150%</option>
              </select>
            </div>
          </div>
        </div>

        <div class="group-box">
          <div class="group-box-title">Display</div>
          <div class="checkbox-row">
            <input type="checkbox" id="show-statusbar" checked />
            <label for="show-statusbar">Show Status Bar</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="show-tooltips" checked />
            <label for="show-tooltips">Show Tooltips</label>
          </div>
        </div>
      </div>

      <!-- ── Auto Save ── -->
      <div class="pane" id="pane-autosave">
        <div class="group-box">
          <div class="group-box-title">Recovery</div>
          <div class="checkbox-row">
            <input type="checkbox" id="autosave-enabled" checked />
            <label for="autosave-enabled">Automatically save recovery information</label>
          </div>
          <div class="form-row">
            <span class="form-label">Save Interval</span>
            <div class="form-control">
              <input type="number" id="autosave-interval" value="60" min="10" max="600" />
              <span class="form-hint">seconds</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Performance ── -->
      <div class="pane" id="pane-performance">
        <div class="group-box">
          <div class="group-box-title">Processing</div>
          <div class="form-row">
            <span class="form-label">Performance Mode</span>
            <div class="form-control">
              <select id="perf-mode">
                <option value="balanced">Balanced</option>
                <option value="low">Power Saver</option>
                <option value="maximum">Maximum Performance</option>
              </select>
            </div>
          </div>
        </div>

        <div class="group-box">
          <div class="group-box-title">Hardware</div>
          <div class="checkbox-row">
            <input type="checkbox" id="hw-accel" checked />
            <label for="hw-accel">Enable hardware acceleration</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="gpu-enabled" checked />
            <label for="gpu-enabled">Enable GPU processing</label>
          </div>
        </div>
      </div>

      <!-- ── Media Cache ── -->
      <div class="pane" id="pane-cache">
        <div class="group-box">
          <div class="group-box-title">Cache Location</div>
          <div class="form-row">
            <span class="form-label">Cache Folder</span>
            <div class="form-control">
              <input type="text" id="cache-location" readonly style="min-width: 260px; color: var(--text-tertiary);" />
              <button id="browse-cache">Browse...</button>
            </div>
          </div>
          <div class="form-row">
            <span class="form-label">Maximum Size</span>
            <div class="form-control">
              <input type="number" id="cache-max" value="10" min="1" max="100" />
              <span class="form-hint">GB</span>
            </div>
          </div>
        </div>

        <div class="group-box">
          <div class="group-box-title">Maintenance</div>
          <div class="checkbox-row">
            <input type="checkbox" id="cleanup-cache" checked />
            <label for="cleanup-cache">Automatically clean old cache files</label>
          </div>
          <div class="action-row">
            <button id="clear-cache">Clean Cache Now</button>
          </div>
        </div>
      </div>

      <!-- ── System Tray ── -->
      <div class="pane" id="pane-tray">
        <div class="group-box">
          <div class="group-box-title">Behavior</div>
          <div class="checkbox-row">
            <input type="checkbox" id="minimize-to-tray" />
            <label for="minimize-to-tray">Minimize to system tray when window is closed</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="show-tray-icon" checked />
            <label for="show-tray-icon">Show icon in system tray</label>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="left">
      <button id="help-btn">Help</button>
      <button id="reset-btn">Reset...</button>
    </div>
    <button id="cancel-btn">Cancel</button>
    <button class="primary" id="ok-btn">OK</button>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
