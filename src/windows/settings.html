<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Preferences</title>
  <link rel="stylesheet" href="../styles/shared.css" />
  <style>
    body {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .settings-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 180px;
      min-width: 180px;
      background: var(--surface-primary);
      overflow-y: auto;
      padding: 8px 0;
      flex-shrink: 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      width: 100%;
      height: 28px;
      padding: 0 16px;
      font-size: 13px;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-radius: 0;
      text-align: left;
      cursor: pointer;
      outline: none;
      font-family: var(--font-ui);
      transition: background 0.08s, color 0.08s;
    }
    .sidebar-item:hover {
      color: var(--text-primary);
    }
    .sidebar-item.active {
      background: var(--surface-active);
      color: var(--text-bright);
    }

    /* ── Content ── */
    .content {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 20px 28px;
      background: var(--surface-secondary);
      border-left: 1px solid var(--border-subtle);
    }

    .pane { display: none; }
    .pane.active { display: block; }

    /* Section header -- just text + rule */
    .section-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 6px;
      margin-top: 24px;
    }
    .section-header:first-child {
      margin-top: 0;
    }

    /* Form row -- label left, control right */
    .row {
      display: flex;
      align-items: center;
      height: 30px;
      padding: 0;
    }
    .row-label {
      width: 180px;
      min-width: 180px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .row-value {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    .row-hint {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* Checkbox row -- tighter, inline */
    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 26px;
    }
    .check label {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    /* Inputs sized for this context */
    .content select { min-width: 200px; }
    .content input[type="number"] { width: 64px; min-width: 64px; }

    /* Action link / button in content */
    .action-link {
      font-size: 13px;
      color: var(--accent-blue);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      height: auto;
    }
    .action-link:hover { color: var(--text-bright); }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      height: 44px;
      padding: 0 16px;
      border-top: 1px solid var(--border-standard);
      background: var(--surface-primary);
      flex-shrink: 0;
    }
    .footer .spacer { margin-right: auto; }
    .footer button { min-width: 72px; }
  </style>
</head>
<body>
  <div class="settings-layout">
    <nav class="sidebar" id="sidebar">
      <button class="sidebar-item active" data-pane="general">General</button>
      <button class="sidebar-item" data-pane="appearance">Appearance</button>
      <button class="sidebar-item" data-pane="autosave">Auto Save</button>
      <button class="sidebar-item" data-pane="performance">Performance</button>
      <button class="sidebar-item" data-pane="cache">Media Cache</button>
      <button class="sidebar-item" data-pane="tray">System Tray</button>
    </nav>

    <div class="content">

      <!-- General -->
      <div class="pane active" id="pane-general">
        <div class="section-header">Startup</div>
        <div class="row">
          <span class="row-label">At Startup</span>
          <div class="row-value">
            <select id="startup-behavior">
              <option value="empty">Show Empty Workspace</option>
              <option value="last">Restore Last Project</option>
              <option value="welcome">Show Welcome Screen</option>
            </select>
          </div>
        </div>
        <div class="check">
          <input type="checkbox" id="check-updates" checked />
          <label for="check-updates">Check for updates on startup</label>
        </div>
        <div class="check">
          <input type="checkbox" id="autostart" />
          <label for="autostart">Launch at login</label>
        </div>

        <div class="section-header">Language</div>
        <div class="row">
          <span class="row-label">Display Language</span>
          <div class="row-value">
            <select id="locale">
              <option value="en">English</option>
              <option value="es">Espa&#241;ol</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Appearance -->
      <div class="pane" id="pane-appearance">
        <div class="section-header">Theme</div>
        <div class="row">
          <span class="row-label">Application Theme</span>
          <div class="row-value">
            <select id="theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="system">System</option>
            </select>
          </div>
        </div>
        <div class="row">
          <span class="row-label">UI Zoom</span>
          <div class="row-value">
            <select id="zoom">
              <option value="80">80%</option>
              <option value="90">90%</option>
              <option value="100" selected>100%</option>
              <option value="110">110%</option>
              <option value="120">120%</option>
              <option value="150">150%</option>
            </select>
          </div>
        </div>

        <div class="section-header">Display</div>
        <div class="check">
          <input type="checkbox" id="show-statusbar" checked />
          <label for="show-statusbar">Show Status Bar</label>
        </div>
        <div class="check">
          <input type="checkbox" id="show-tooltips" checked />
          <label for="show-tooltips">Show Tooltips</label>
        </div>
      </div>

      <!-- Auto Save -->
      <div class="pane" id="pane-autosave">
        <div class="section-header">Recovery</div>
        <div class="check">
          <input type="checkbox" id="autosave-enabled" checked />
          <label for="autosave-enabled">Automatically save recovery information</label>
        </div>
        <div class="row">
          <span class="row-label">Save Interval</span>
          <div class="row-value">
            <input type="number" id="autosave-interval" value="60" min="10" max="600" />
            <span class="row-hint">seconds</span>
          </div>
        </div>
      </div>

      <!-- Performance -->
      <div class="pane" id="pane-performance">
        <div class="section-header">Processing</div>
        <div class="row">
          <span class="row-label">Performance Mode</span>
          <div class="row-value">
            <select id="perf-mode">
              <option value="balanced">Balanced</option>
              <option value="low">Power Saver</option>
              <option value="maximum">Maximum Performance</option>
            </select>
          </div>
        </div>

        <div class="section-header">Hardware</div>
        <div class="check">
          <input type="checkbox" id="hw-accel" checked />
          <label for="hw-accel">Enable hardware acceleration</label>
        </div>
        <div class="check">
          <input type="checkbox" id="gpu-enabled" checked />
          <label for="gpu-enabled">Enable GPU processing</label>
        </div>
      </div>

      <!-- Media Cache -->
      <div class="pane" id="pane-cache">
        <div class="section-header">Cache Location</div>
        <div class="row">
          <span class="row-label">Cache Folder</span>
          <div class="row-value">
            <input type="text" id="cache-location" readonly style="flex: 1; color: var(--text-tertiary);" />
            <button id="browse-cache">Browse...</button>
          </div>
        </div>
        <div class="row">
          <span class="row-label">Maximum Size</span>
          <div class="row-value">
            <input type="number" id="cache-max" value="10" min="1" max="100" />
            <span class="row-hint">GB</span>
          </div>
        </div>

        <div class="section-header">Maintenance</div>
        <div class="check">
          <input type="checkbox" id="cleanup-cache" checked />
          <label for="cleanup-cache">Automatically clean old cache files</label>
        </div>
        <div style="padding-top: 8px;">
          <button id="clear-cache">Clean Cache Now</button>
        </div>
      </div>

      <!-- System Tray -->
      <div class="pane" id="pane-tray">
        <div class="section-header">Behavior</div>
        <div class="check">
          <input type="checkbox" id="minimize-to-tray" />
          <label for="minimize-to-tray">Minimize to system tray when window is closed</label>
        </div>
        <div class="check">
          <input type="checkbox" id="show-tray-icon" checked />
          <label for="show-tray-icon">Show icon in system tray</label>
        </div>
      </div>

    </div>
  </div>

  <div class="footer">
    <span class="spacer"></span>
    <button id="cancel-btn">Cancel</button>
    <button class="primary" id="ok-btn">OK</button>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
