<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Keyboard Shortcuts</title>
  <link rel="stylesheet" href="../styles/shared.css" />
  <style>
    body {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .window-title {
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      padding: 10px 0 8px;
      border-bottom: 1px solid var(--border-standard);
      background: var(--surface-tertiary);
      flex-shrink: 0;
    }

    /* ---- Keyboard Layout ---- */
    .keyboard-section {
      padding: 16px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .keyboard-row {
      display: flex;
      gap: 3px;
      margin-bottom: 3px;
    }

    .key {
      min-width: 38px;
      min-height: 32px;
      padding: 4px 6px;
      font-size: 11px;
      font-family: var(--font-ui);
      border-radius: 5px;
      background: var(--surface-tertiary);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      position: relative;
      transition: border-color 0.12s, background 0.12s;
      flex-shrink: 0;
    }

    .key:hover {
      border-color: var(--border-emphasis);
    }

    .key.assigned {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
      font-weight: 500;
    }

    .key.assigned:hover {
      filter: brightness(1.15);
    }

    .key.modifier {
      background: var(--surface-active);
      border-color: var(--border-standard);
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Tooltip */
    .key[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-elevated);
      color: var(--text-bright);
      font-size: 11px;
      font-weight: 400;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
      border: 1px solid var(--border-standard);
    }

    /* Key widths (base unit ~38px) */
    .key-w-1   { min-width: 38px; }
    .key-w-1-2 { min-width: 49px; }   /* Cmd */
    .key-w-1-5 { min-width: 60px; }   /* Tab, Delete */
    .key-w-1-8 { min-width: 72px; }   /* Caps, Return */
    .key-w-2-2 { min-width: 87px; }   /* Shift */
    .key-w-5   { min-width: 198px; flex: 1; }  /* Space */

    /* ---- Command List ---- */
    .list-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0 20px;
    }

    .search-bar {
      width: 100%;
      margin: 12px 0 8px;
      flex-shrink: 0;
    }

    .command-list {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 0;
    }

    .category-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      padding: 10px 0 6px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .command-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 12px;
    }

    .command-row:last-child {
      border-bottom: none;
    }

    .command-name {
      color: var(--text-primary);
    }

    .command-keys {
      display: flex;
      gap: 4px;
    }

    .command-keys kbd {
      font-family: var(--font-ui);
      font-size: 11px;
      padding: 2px 6px;
      background: var(--surface-tertiary);
      border: 1px solid var(--border-standard);
      border-radius: 4px;
      color: var(--text-secondary);
      min-width: 22px;
      text-align: center;
    }

    .no-results {
      padding: 24px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 12px;
    }

    /* ---- Footer ---- */
    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border-standard);
      background: var(--surface-secondary);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="window-title">Keyboard Shortcuts</div>

  <div class="keyboard-section" id="keyboard"></div>

  <div class="list-section">
    <input type="search" class="search-bar" id="search" placeholder="Search shortcuts..." />
    <div class="command-list" id="command-list"></div>
  </div>

  <div class="footer">
    <button id="cancel-btn">Cancel</button>
    <button class="primary" id="ok-btn">OK</button>
  </div>

  <script type="module" src="shortcuts.js"></script>
</body>
</html>
