<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Keyboard Shortcuts</title>
  <link rel="stylesheet" href="../styles/shared.css" />
  <style>
    body { overflow-y: auto; }
    .shortcuts-container {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px 20px;
    }
    .shortcuts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .shortcuts-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
    }
    .search-box {
      width: 200px;
    }
    .group { margin-bottom: 20px; }
    .group-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .shortcut-row:last-child { border-bottom: none; }
    .shortcut-action { font-size: 12px; color: var(--text-primary); }
    .shortcut-keys {
      display: flex;
      gap: 4px;
    }
    kbd {
      font-family: var(--font-ui);
      font-size: 11px;
      padding: 2px 6px;
      background: var(--surface-tertiary);
      border: 1px solid var(--border-standard);
      border-radius: 4px;
      color: var(--text-secondary);
      min-width: 22px;
      text-align: center;
    }
    .no-results {
      padding: 24px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="shortcuts-container">
    <div class="shortcuts-header">
      <h1>Keyboard Shortcuts</h1>
      <input type="search" class="search-box" id="search" placeholder="Search shortcuts..." />
    </div>
    <div id="shortcuts-list"></div>
  </div>
  <script type="module" src="shortcuts.js"></script>
</body>
</html>
