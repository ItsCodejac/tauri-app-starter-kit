<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading</title>
  <style>
    /*
     * All inline for instant render — no external CSS deps.
     * These values match shared.css defaults. If you change shared.css, update these too.
     *   --surface-base: #0d0d0d  --surface-hover: #333
     *   --text-primary: #e0e0e0  --text-bright: #fff
     *   --text-secondary: #999   --text-tertiary: #666
     *   --accent-blue: #4a9eff   --border-emphasis: #555
     */
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d; /* --surface-base */
      color: #e0e0e0; /* --text-primary */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .logo {
      width: 64px; height: 64px;
      border-radius: 14px;
      background: #4a9eff; /* --accent-blue */
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff; /* --text-bright */
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    .logo img { width: 48px; height: 48px; object-fit: contain; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .name { font-size: 20px; font-weight: 600; color: #fff; /* --text-bright */ margin-bottom: 4px; }
    .tagline { font-size: 12px; color: #999; /* --text-secondary */ margin-bottom: 4px; }
    .version { font-size: 12px; color: #666; /* --text-tertiary */ margin-bottom: 24px; }
    .status { font-size: 11px; color: #666; /* --text-tertiary */ margin-bottom: 12px; min-height: 16px; }
    .progress { width: 200px; height: 2px; background: #333; /* --surface-hover */ border-radius: 1px; overflow: hidden; }
    .progress-bar {
      height: 100%; background: #4a9eff; /* --accent-blue */ width: 30%;
      animation: loading 1.5s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .copyright {
      position: absolute; bottom: 12px;
      font-size: 10px; color: #555; /* --border-emphasis */
    }
  </style>
</head>
<body>
  <div class="logo" id="logo">M</div>
  <div class="name" id="name">My App</div>
  <div class="tagline" id="tagline"></div>
  <div class="version" id="version"></div>
  <div class="status" id="status">Loading...</div>
  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="copyright" id="copyright"></div>
  <script type="module" src="splash.js"></script>
</body>
</html>
