<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>What's New</title>
  <link rel="stylesheet" href="../styles/shared.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      flex-shrink: 0;
    }
    .header-icon {
      width: 36px; height: 36px;
      border-radius: 14px;
      background: var(--accent-blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: white; font-weight: 700;
      flex-shrink: 0;
    }
    .header-icon img { width: 28px; height: 28px; object-fit: contain; }
    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
    }
    .header-text .version {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .releases-container {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 24px 16px;
    }
    .release {
      margin-bottom: 24px;
    }
    .release-version {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 4px;
    }
    .release-date {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }
    .release-body {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.6;
      user-select: text;
      -webkit-user-select: text;
    }
    .release-body ul {
      padding-left: 18px;
      margin: 4px 0;
    }
    .release-body li {
      margin-bottom: 4px;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 4px;
    }
    .badge-new { background: var(--accent-blue-dim); color: var(--accent-blue); }
    .badge-fix { background: var(--accent-green-dim); color: var(--accent-green); }
    .badge-improved { background: var(--accent-orange-dim); color: var(--accent-orange); }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      height: 44px;
      padding: 0 16px;
      border-top: 1px solid var(--border-standard);
      background: var(--surface-primary);
      flex-shrink: 0;
    }
    .footer button { min-width: 72px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon" id="icon">M</div>
    <div class="header-text">
      <h1>What's New</h1>
      <div class="version" id="version"></div>
    </div>
  </div>
  <div class="releases-container">
    <div id="releases"></div>
  </div>
  <div class="footer">
    <button class="primary" id="close-btn">Got it</button>
  </div>
  <script type="module" src="whatsnew.js"></script>
</body>
</html>
